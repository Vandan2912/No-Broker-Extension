<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookmarks — Image Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="brand">
      <span class="brand-icon">&#128278;</span>
      <h1>My Bookmarks</h1>
    </div>
    <div class="header-right">
      <a href="index.html">&#8592; Back to Viewer</a>
      <a id="mapLink" href="#" target="_blank" rel="noopener" hidden>&#128205; View on Map</a>
      <span id="count"></span>
    </div>
  </header>

  <div id="listView">
    <div class="panel-actions bookmarks-toolbar">
      <button id="mapAllBtn" hidden>&#128205; View All on Map</button>
    </div>
    <div id="emptyState" class="empty-state" hidden>No saved properties yet. Go save one from the viewer.</div>
    <div id="bookmarksGrid" class="grid" hidden></div>
  </div>

  <div id="detailView" hidden>
    <a href="bookmarks.html" class="back-link">&#8592; Back to bookmarks</a>
    <div id="propertyInfo" class="property-info" hidden></div>
    <div id="videoSection" hidden></div>
    <div id="grid"></div>
  </div>

  <div id="detailNotFound" class="empty-state" hidden>Bookmark not found. It may have been removed.</div>

  <div id="lightbox">
    <div class="lightbox-top">
      <span id="lightbox-counter"></span>
      <select id="sizeSelect">
        <option value="thumbnail">Thumbnail</option>
        <option value="medium">Medium</option>
        <option value="large" selected>Large</option>
        <option value="original">Original</option>
      </select>
      <button id="rotate-left" class="icon-btn" aria-label="Rotate left">&#8634;</button>
      <button id="rotate-right" class="icon-btn" aria-label="Rotate right">&#8635;</button>
    </div>
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <button id="lightbox-prev" class="nav-btn" aria-label="Previous">&#8249;</button>
    <img id="lightbox-img" src="" alt="" />
    <button id="lightbox-next" class="nav-btn" aria-label="Next">&#8250;</button>
  </div>

  <script src="viewer.js"></script>
  <script src="bookmarks.js"></script>
  <script src="bookmarks-page.js"></script>
</body>
</html>
